<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Damage Classifier | Morehod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        #imagePreview { max-height: 250px; display: none; margin: 0 auto; border-radius: 12px; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/20">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 text-white text-center">
            <h1 class="text-3xl font-extrabold tracking-tight">AI Car Check</h1>
            <p class="mt-2 text-blue-100 opacity-90">Классификация повреждений автомобиля</p>
        </div>

        <div class="p-8">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-600 mb-2">Выберите фотографию:</label>
                <input type="file" id="imageInput" accept="image/*" 
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>

            <img id="imagePreview" src="#" alt="Preview" class="mb-6 shadow-lg border-4 border-white">

            <button onclick="analyzeImage()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] flex items-center justify-center">
                <span id="btnText">Проверить машину</span>
                <div id="loader" class="hidden loader w-5 h-5 border-2 border-white rounded-full ml-3"></div>
            </button>

            <div id="result" class="mt-8 text-center hidden animate-fade-in">
                <p class="text-slate-400 text-xs uppercase tracking-widest font-bold">Результат анализа</p>
                <div id="statusLabel" class="text-3xl font-black mt-2"></div>
                
                <div class="mt-4 bg-slate-100 rounded-full h-2 w-full overflow-hidden">
                    <div id="confidenceBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <div id="confidenceText" class="text-sm text-slate-500 mt-2 font-medium"></div>
            </div>
        </div>
        
        <div class="px-8 pb-6 text-center">
            <p class="text-[10px] text-slate-400">Powered by Hugging Face & Gradio Client</p>
        </div>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const resultDiv = document.getElementById('result');
        const statusLabel = document.getElementById('statusLabel');
        const btn = document.getElementById('btn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const confidenceBar = document.getElementById('confidenceBar');
        const confidenceText = document.getElementById('confidenceText');

        // Показ превью картинки
        imageInput.onchange = evt => {
            const [file] = imageInput.files;
            if (file) {
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.style.display = 'block';
                resultDiv.classList.add('hidden');
            }
        }

        // Главная функция анализа
        window.analyzeImage = async () => {
            const file = imageInput.files[0];
            if (!file) {
                alert("Пожалуйста, выберите файл!");
                return;
            }

            // UI в состояние загрузки
            btn.disabled = true;
            btnText.innerText = "Анализирую...";
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // 1. Подключаемся к твоему Space
                const app = await Client.connect("Morehod/first_model");
                
                // 2. Делаем предсказание
                // Важно: путь "/classify_image" и ключ "img" взяты из твоего примера
                const result = await app.predict("/classify_image", { 
                    img: file 
                });

                showResult(result.data);
            } catch (error) {
                console.error(error);
                alert("Произошла ошибка при обращении к модели. Проверьте, что Space запущен.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Проверить машину";
                loader.classList.add('hidden');
            }
        }

        function showResult(data) {
            resultDiv.classList.remove('hidden');
            
            // data — это массив, который вернула твоя функция classify_image
            // Обычно Gradio для классификации возвращает объект с метками
            // Например: { "label": "broken", "confidences": [{"label": "broken", "score": 0.98}, ...]}
            
            let label = "";
            let score = 0;

            if (data[0].label) {
                label = data[0].label;
                score = data[0].confidences[0].score;
            } else {
                // Если формат другой, берем первый элемент (зависит от твоей функции в Python)
                label = "Обработано"; 
            }

            // Красивый вывод
            const isDamaged = label.toLowerCase().includes('damage') || label.toLowerCase().includes('broken');
            
            statusLabel.innerText = isDamaged ? "⚠️ РАЗБИТА" : "✅ ЦЕЛАЯ";
            statusLabel.className = `text-3xl font-black mt-2 ${isDamaged ? 'text-red-500' : 'text-green-600'}`;
            
            const percent = Math.round(score * 100);
            confidenceBar.style.width = percent + "%";
            confidenceBar.className = `h-full transition-all duration-1000 ${isDamaged ? 'bg-red-500' : 'bg-green-500'}`;
            confidenceText.innerText = `Уверенность модели: ${percent}%`;
        }
    </script>
</body>
</html>
