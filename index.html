<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Damage Analyzer | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .tech-font { font-family: 'JetBrains Mono', monospace; }
        .status-card { border-left: 4px solid transparent; transition: all 0.3s ease; }
        .scan-line {
            height: 2px;
            background: #3b82f6;
            position: absolute;
            width: 100%;
            z-index: 10;
            top: 0;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
            <div>
                <h1 class="text-xs uppercase tracking-[0.3em] text-blue-500 font-black">Diagnostic System v1.0</h1>
                <h2 class="text-xl font-bold text-white">ANALYZER_CAR_DAMAGE</h2>
            </div>
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>

        <div class="p-8">
            <div class="relative group border-2 border-dashed border-slate-700 hover:border-blue-500 transition-colors p-4 mb-8 bg-slate-800/30">
                <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                
                <div class="relative overflow-hidden bg-black flex items-center justify-center min-h-[200px]">
                    <div id="scanLine" class="scan-line"></div>
                    <img id="imagePreview" src="#" alt="" class="max-h-64 hidden z-0">
                    <div id="placeholder" class="text-center">
                        <svg class="mx-auto h-12 w-12 text-slate-500 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-sm text-slate-400 uppercase tracking-widest">Загрузить данные объекта</p>
                    </div>
                </div>
            </div>

            <button onclick="analyzeImage()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 font-bold text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-3">
                <span id="btnText">Запустить анализ</span>
                <div id="loader" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>

            <div id="result" class="mt-8 hidden space-y-4">
                <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-2 tech-font">Diagnostic Report:</div>
                
                <div id="statusCard" class="bg-slate-800/50 p-6 status-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-xs text-slate-400 uppercase mb-1">Status:</div>
                            <div id="statusLabel" class="text-2xl font-black tracking-tighter uppercase"></div>
                        </div>
                        <div id="confidenceBox" class="text-right hidden">
                            <div class="text-xs text-slate-400 uppercase mb-1">Confidence:</div>
                            <div id="confidenceValue" class="text-2xl font-black tech-font text-blue-400">0%</div>
                        </div>
                    </div>
                    
                    <div id="progressWrapper" class="mt-4 bg-slate-950 h-1.5 w-full hidden">
                        <div id="confidenceBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <button onclick="location.reload()" class="text-[10px] text-slate-500 uppercase hover:text-white transition-colors flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Сброс системы
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const placeholder = document.getElementById('placeholder');
        const scanLine = document.getElementById('scanLine');
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('btn');

        imageInput.onchange = evt => {
            const [file] = imageInput.files;
            if (file) {
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.classList.remove('hidden');
                placeholder.classList.add('hidden');
                resultDiv.classList.add('hidden');
            }
        }

        window.analyzeImage = async () => {
            const file = imageInput.files[0];
            if (!file) return;

            btn.disabled = true;
            document.getElementById('btnText').innerText = "Анализ...";
            document.getElementById('loader').classList.remove('hidden');
            scanLine.style.display = 'block';

            try {
                const app = await Client.connect("Morehod/first_model");
                const result = await app.predict("/classify_image", { img: file });
                showResult(result.data);
            } catch (error) {
                console.error(error);
                alert("SYSTEM ERROR: Check console for logs");
            } finally {
                btn.disabled = false;
                document.getElementById('btnText').innerText = "Запустить анализ";
                document.getElementById('loader').classList.add('hidden');
                scanLine.style.display = 'none';
            }
        }

        function showResult(data) {
            resultDiv.classList.remove('hidden');
            const statusLabel = document.getElementById('statusLabel');
            const statusCard = document.getElementById('statusCard');
            const confBox = document.getElementById('confidenceBox');
            const confValue = document.getElementById('confidenceValue');
            const confBar = document.getElementById('confidenceBar');
            const progWrapper = document.getElementById('progressWrapper');

            let label = "Unknown";
            let score = null;

            // Обработка разных форматов API
            const main = data[0];
            if (typeof main === 'string') {
                label = main;
            } else if (main.label) {
                label = main.label;
                score = main.confidences ? main.confidences[0].score : main.score;
            }

            const isDamaged = label.toLowerCase().includes('damage') || label.toLowerCase().includes('broken');
            
            // Настройка визуалов
            statusLabel.innerText = isDamaged ? "Damage_Detected" : "No_Damage_Found";
            statusLabel.className = `text-2xl font-black tracking-tighter uppercase ${isDamaged ? 'text-red-500' : 'text-green-500'}`;
            statusCard.style.borderLeftColor = isDamaged ? '#ef4444' : '#22c55e';

            // Проверка на NaN и отображение процентов
            if (score !== null && !isNaN(score)) {
                const percent = Math.round(score * 100);
                confBox.classList.remove('hidden');
                progWrapper.classList.remove('hidden');
                confValue.innerText = percent + "%";
                confValue.className = `text-2xl font-black tech-font ${isDamaged ? 'text-red-400' : 'text-green-400'}`;
                confBar.style.width = percent + "%";
                confBar.className = `h-full transition-all duration-1000 ${isDamaged ? 'bg-red-500' : 'bg-green-500'}`;
            } else {
                confBox.classList.add('hidden');
                progWrapper.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
